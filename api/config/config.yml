# LiteLLM model id — must match a provider-supported slug (see README §2).
# Default: OpenAI GPT-5.5 (frontier). Override with LLM_MODEL in .env (e.g. openai/gpt-4o).
model: "openai/gpt-5.5"
temperature: 0.1
max_rounds: 30
pressure_soft_pct: 60
pressure_medium_pct: 80
pressure_hard_pct: 100
# Fewer chunks → smaller prompts (helps low OpenAI TPM tiers, e.g. 10k/min).
rag_n_results: 4
